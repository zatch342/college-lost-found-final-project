<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>
        <p class="muted">Access the campus lost and found board.</p>

        <div class="alert success" th:if="${param.registered}">Account created. Please login.</div>
        <div class="alert" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert success" th:if="${param.logout}">You have been logged out.</div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Email
                <input type="email" name="email" placeholder="student@email.com" required>
            </label>
            <label>Password
                <input type="password" name="password" placeholder="At least 6 characters" required>
            </label>
            <button class="button primary" type="submit">Login</button>
        </form>
        <p class="switch-link">No account? <a th:href="@{/register}">Create one</a></p>
    </section>
</main>
</body>
</html>
