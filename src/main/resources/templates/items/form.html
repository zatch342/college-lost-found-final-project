<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${mode == 'edit' ? 'Edit Item' : 'New Item'})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="page narrow form-page">
    <section class="section-head">
        <p class="eyebrow" th:text="${mode == 'edit' ? 'Update post' : 'Create post'}">Create post</p>
        <h1 th:text="${mode == 'edit' ? 'Edit item' : 'Post lost or found item'}">Post item</h1>
    </section>
    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <form class="panel form-grid"
          th:action="${mode == 'edit'} ? @{/items/{id}(id=${item.id})} : @{/items}"
          th:object="${item}"
          method="post"
          enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label>Title
            <input th:field="*{title}" type="text" placeholder="Black wallet, blue umbrella..." required>
            <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </label>

        <label>Status
            <select th:field="*{status}" required>
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
            </select>
        </label>

        <label>Location
            <input th:field="*{location}" type="text" placeholder="Library 2F, cafeteria, gym..." required>
            <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
        </label>

        <label>Contact Info
            <input th:field="*{contactInfo}" type="text" placeholder="Email, phone, or Kakao ID">
        </label>

        <label class="full">Description
            <textarea th:field="*{description}" rows="5" placeholder="Add color, brand, date, and identifying details." required></textarea>
            <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
        </label>

        <label class="full">Image
            <input type="file" name="image" accept="image/png,image/jpeg,image/gif,image/webp">
            <span class="hint" th:if="${mode == 'edit'}">Leave empty to keep the current image.</span>
        </label>

        <div class="form-actions full">
            <a class="button ghost" th:href="@{/items}">Cancel</a>
            <button class="button primary" type="submit" th:text="${mode == 'edit' ? 'Save Changes' : 'Create Post'}">Save</button>
        </div>
    </form>
</main>
</body>
</html>
