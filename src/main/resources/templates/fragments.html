<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Campus Lost & Found'">Campus Lost & Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="topbar" th:fragment="nav">
    <a class="brand" th:href="@{/items}">
        <img class="brand-logo" th:src="@{/images/college-logo.png}" alt="College logo">
        <span>Campus Lost & Found</span>
    </a>
    <div class="nav-actions">
        <a sec:authorize="isAuthenticated()" th:href="@{/items/new}" class="button small">Post Item</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="button ghost small" type="submit">Logout</button>
        </form>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="button ghost small">Login</a>
    </div>
</nav>
</body>
</html>
